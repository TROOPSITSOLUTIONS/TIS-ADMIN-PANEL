<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCT | ADVANCED ADMIN PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05050a;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        
        /* Login Screen */
        .login-overlay {
            position: fixed; inset: 0; background: #05050a; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 20% 50%, rgba(255,0,51,0.1), transparent 50%);
        }
        .login-card {
            background: rgba(15,15,25,0.95); border: 1px solid #ff0033;
            padding: 40px; max-width: 400px; width: 90%; border-radius: 24px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .login-card h2 { font-family: 'Orbitron'; color: #ff0033; margin-bottom: 10px; }
        .login-card p { color: #666; font-size: 13px; margin-bottom: 25px; }
        .login-card input {
            width: 100%; background: #0a0a10; border: 1px solid #222;
            padding: 14px; border-radius: 12px; color: #fff; font-size: 16px;
            margin-bottom: 20px; text-align: center;
        }
        .login-card input:focus { border-color: #ff0033; outline: none; }
        
        /* Main App */
        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Tabs */
        .tabs {
            display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,0,51,0.2);
            margin-bottom: 30px; padding-bottom: 10px;
        }
        .tab-btn {
            background: transparent; border: none; color: #888; padding: 12px 24px;
            cursor: pointer; font-family: 'Orbitron'; font-size: 13px; border-radius: 10px;
            transition: 0.3s;
        }
        .tab-btn.active { background: rgba(255,0,51,0.15); color: #ff0033; border-bottom: 2px solid #ff0033; }
        .tab-btn:hover { color: #ff0033; }
        
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Cards */
        .card {
            background: rgba(15,15,25,0.6); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 25px; margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .card-title {
            font-family: 'Orbitron'; color: #ff0033; margin-bottom: 20px;
            font-size: 18px; border-left: 3px solid #ff0033; padding-left: 15px;
        }
        
        /* Inputs */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 600; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; background: #0a0a10; border: 1px solid #222; color: #fff;
            padding: 12px 15px; border-radius: 12px; font-size: 14px;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: #ff0033; outline: none; }
        
        /* Items List */
        .items-list { margin-bottom: 20px; }
        .item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 15px; margin-bottom: 10px; border-radius: 14px;
            display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
        }
        .item input { flex: 1; background: #0a0a10; border: 1px solid #222; padding: 10px 12px; border-radius: 10px; color: #fff; }
        
        /* Tools Section Styling with Drag & Drop */
        .tools-section {
            background: rgba(10,10,18,0.8);
            border: 1px solid rgba(255,0,51,0.15);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .section-header-bar {
            display: flex; align-items: center; gap: 12px; padding: 18px 20px;
            background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
        }
        .section-header-bar input {
            flex: 2; background: #0a0a10; border: 1px solid #222; padding: 10px 15px;
            border-radius: 10px; color: #fff; font-weight: 600;
        }
        .section-header-bar input:focus { border-color: #ff0033; outline: none; }
        .section-header-bar .color-picker {
            width: 45px; height: 40px; border: 1px solid #222; border-radius: 10px;
            background: #0a0a10; cursor: pointer;
        }
        .drag-section-handle {
            cursor: grab; color: #666; font-size: 18px; padding: 5px;
        }
        .drag-section-handle:active { cursor: grabbing; }
        
        /* Tools List Container for Drag & Drop */
        .tools-list {
            padding: 15px;
            min-height: 100px;
        }
        .tool-item {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 10px; border-radius: 12px; cursor: pointer;
            transition: 0.2s;
        }
        .tool-item:hover { background: rgba(255,0,51,0.08); border-color: rgba(255,0,51,0.3); }
        .tool-item-header {
            display: flex; align-items: center; gap: 12px; padding: 14px 18px;
        }
        .drag-handle {
            cursor: grab; color: #555; font-size: 16px;
        }
        .drag-handle:active { cursor: grabbing; }
        .tool-icon-preview { width: 30px; color: #ff0033; font-size: 16px; }
        .tool-title-preview { flex: 1; font-weight: 500; font-size: 14px; }
        .tool-edit-panel {
            display: none; padding: 18px; border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }
        .tool-item.active .tool-edit-panel { display: block; }
        
        /* Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
        
        /* Buttons */
        .btn {
            background: transparent; border: 1px solid #ff0033; color: #ff0033;
            padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600;
            transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:hover { background: #ff0033; color: #000; transform: translateY(-2px); }
        .btn-danger { border-color: #ff0055; color: #ff0055; }
        .btn-danger:hover { background: #ff0055; color: #fff; }
        .btn-success { background: #ff0033; color: #000; border: none; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        
        /* Save Bar */
        .save-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5,5,10,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid #ff0033; padding: 15px; text-align: center; z-index: 1000;
        }
        
        /* Sortable Ghost */
        .sortable-ghost {
            opacity: 0.4; background: rgba(255,0,51,0.2);
            border: 2px dashed #ff0033;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a10; }
        ::-webkit-scrollbar-thumb { background: #ff0033; border-radius: 10px; }
    </style>
</head>
<body>

<!-- Login Overlay (Token & ID Auto-filled) -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-shield-alt" style="font-size: 48px; color: #ff0033; margin-bottom: 15px;"></i>
        <h2>BCT CONTROL CENTER</h2>
        <p>Enter admin password to access dashboard</p>
        <input type="password" id="adminPass" placeholder="••••••••" autofocus>
        <button class="btn" onclick="checkLogin()" style="width: 100%; justify-content: center;">AUTHENTICATE</button>
    </div>
</div>

<!-- Main Admin Panel -->
<div class="app-container" id="mainApp" style="display:none;">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('site')"><i class="fas fa-globe"></i> Site Config</button>
        <button class="tab-btn" onclick="showTab('menu')"><i class="fas fa-bars"></i> Menu Bar</button>
        <button class="tab-btn" onclick="showTab('banner')"><i class="fas fa-images"></i> Banner</button>
        <button class="tab-btn" onclick="showTab('tools')"><i class="fas fa-tools"></i> Tools <span style="color:#ff0033;">(Drag & Drop)</span></button>
        <button class="tab-btn" onclick="showTab('social')"><i class="fas fa-share-alt"></i> Social</button>
        <button class="tab-btn" onclick="showTab('ramadan')"><i class="fas fa-moon"></i> Ramadan</button>
        <button class="tab-btn" onclick="showTab('footer')"><i class="fas fa-link"></i> Footer</button>
    </div>
    
    <!-- Site Config Tab -->
    <div id="tab-site" class="tab-content active">
        <div class="card">
            <div class="card-title"><i class="fas fa-cog"></i> General Settings</div>
            <div class="grid-2">
                <div class="input-group"><label>Site Title</label><input type="text" id="siteTitle" placeholder="Site Title"></div>
                <div class="input-group"><label>Primary Color</label><input type="color" id="primaryColor" style="height: 45px;"></div>
                <div class="input-group"><label>Logo URL</label><input type="text" id="logoUrl" placeholder="logo.png"></div>
                <div class="input-group"><label>Footer Text</label><input type="text" id="footerText" placeholder="Copyright text"></div>
            </div>
        </div>
    </div>
    
    <!-- Menu Tab -->
    <div id="tab-menu" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-bars"></i> Navigation Menu Items</div>
            <div id="menuList" class="items-list"></div>
            <button class="btn" onclick="addMenuItem()"><i class="fas fa-plus"></i> Add Menu Item</button>
        </div>
    </div>
    
    <!-- Banner Tab -->
    <div id="tab-banner" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-images"></i> Banner Slides</div>
            <div id="bannerList" class="items-list"></div>
            <button class="btn" onclick="addBanner()"><i class="fas fa-plus"></i> Add Slide</button>
        </div>
    </div>
    
    <!-- Tools Tab (With Drag & Drop) -->
    <div id="tab-tools" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-arrows-alt"></i> Tools Manager - Drag to Reorder / Move Between Sections</div>
            <div id="toolsContainer"></div>
            <button class="btn" onclick="addToolSection()" style="width:100%; margin-top: 15px;"><i class="fas fa-plus-circle"></i> ADD NEW CATEGORY</button>
        </div>
    </div>
    
    <!-- Social Tab -->
    <div id="tab-social" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-share-alt"></i> Social Media Links</div>
            <div id="socialList" class="items-list"></div>
            <button class="btn" onclick="addSocial()"><i class="fas fa-plus"></i> Add Social Link</button>
        </div>
    </div>
    
    <!-- Ramadan Dialog Tab -->
    <div id="tab-ramadan" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-moon"></i> Ramadan Dialog Control</div>
            <div class="input-group">
                <label>Enable Ramadan Dialog</label>
                <select id="ramadanEnabled">
                    <option value="false">Disabled</option>
                    <option value="true">Enabled</option>
                </select>
            </div>
            <div class="input-group"><label>Dialog Title</label><input type="text" id="ramadanTitle" placeholder="🌙 Ramadan Mubarak"></div>
            <div class="input-group"><label>Dialog Message</label><textarea id="ramadanMessage" rows="3" placeholder="Your custom message..."></textarea></div>
            <div class="input-group"><label>Button Text</label><input type="text" id="ramadanButtonText" placeholder="View Schedule"></div>
            <div class="input-group"><label>Button Link</label><input type="text" id="ramadanButtonLink" placeholder="ramadan-time.html"></div>
        </div>
    </div>
    
    <!-- Footer Tab -->
    <div id="tab-footer" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-link"></i> Footer Links</div>
            <div id="footerList" class="items-list"></div>
            <button class="btn" onclick="addFooterLink()"><i class="fas fa-plus"></i> Add Footer Link</button>
        </div>
    </div>
</div>

<div class="save-bar">
    <button class="btn btn-success" onclick="saveAllData()" style="padding: 14px 40px;"><i class="fas fa-save"></i> SAVE ALL CHANGES</button>
</div>

<script>
    // ================= CONFIGURATION (Auto-filled) =================
    const GIST_ID = '3bfa4b9ca8dbdc1038918d63329096b3';
    const GITHUB_TOKEN = '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';
    const ADMIN_PASSWORD = 'bct@#12';
    let websiteData = null;
    let sortableInstances = [];
    
    // ================= LOGIN CHECK =================
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadFromGist();
        } else {
            Swal.fire({ icon: 'error', title: 'Access Denied!', text: 'Invalid password', background: '#0a0a10', color: '#fff' });
        }
    }
    
    // ================= LOAD FROM GIST =================
    async function loadFromGist() {
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (!response.ok) throw new Error('Gist not found');
            
            const gistData = await response.json();
            
            if (gistData.files && gistData.files['tools.json']) {
                websiteData = JSON.parse(gistData.files['tools.json'].content);
            } else {
                createDefaultData();
            }
            renderAllTabs();
            Swal.fire({ icon: 'success', title: 'Connected!', text: 'Data loaded successfully', background: '#0a0a10', color: '#fff', timer: 1500, showConfirmButton: false });
        } catch(error) {
            createDefaultData();
            renderAllTabs();
            Swal.fire({ icon: 'warning', title: 'Using Default Data', text: 'Could not fetch from Gist', background: '#0a0a10', color: '#fff' });
        }
    }
    
    function createDefaultData() {
        websiteData = {
            siteConfig: { siteTitle: "Bangladesh Cyber Tribe", primaryColor: "#ff0033", logoUrl: "teambctlogo.jpeg", footerText: "© 2026 BANGLADESH CYBER TRIBE" },
            menuItems: [
                { name: "About Us", link: "about.html" },
                { name: "Meet The Team", link: "MembersPanel.html" },
                { name: "Contact", link: "contactus.html" }
            ],
            bannerSlides: [
                { image: "bctbanner.jpeg", link: "about.html", title: "Banner 1" }
            ],
            socialLinks: [
                { platform: "Telegram", url: "https://t.me/bct_muslims", icon: "fab fa-telegram-plane" }
            ],
            footerLinks: [
                { name: "Home", link: "#" }
            ],
            ramadanDialog: {
                enabled: true,
                title: "🌙 Ramadan Mubarak",
                message: "রমজানের সেহরি ও ইফতারের সময়সূচি জানতে ক্লিক করুন",
                buttonText: "সময়সূচি দেখুন",
                buttonLink: "ramadan-time.html"
            },
            tools: {
                sections: [
                    {
                        section_title: "🔐 SECURITY TOOLS",
                        title_color: "#ff0033",
                        tools: [
                            { title: "IP Tracker", url: "https://ipinfo.io", icon: "fas fa-map-marker-alt", desc: "Track IP addresses", tag: "POPULAR" }
                        ]
                    }
                ]
            }
        };
    }
    
    // ================= RENDER ALL =================
    function renderAllTabs() {
        // Site Config
        document.getElementById('siteTitle').value = websiteData.siteConfig.siteTitle || '';
        document.getElementById('primaryColor').value = websiteData.siteConfig.primaryColor || '#ff0033';
        document.getElementById('logoUrl').value = websiteData.siteConfig.logoUrl || '';
        document.getElementById('footerText').value = websiteData.siteConfig.footerText || '';
        
        // Ramadan
        document.getElementById('ramadanEnabled').value = websiteData.ramadanDialog?.enabled ? 'true' : 'false';
        document.getElementById('ramadanTitle').value = websiteData.ramadanDialog?.title || '';
        document.getElementById('ramadanMessage').value = websiteData.ramadanDialog?.message || '';
        document.getElementById('ramadanButtonText').value = websiteData.ramadanDialog?.buttonText || '';
        document.getElementById('ramadanButtonLink').value = websiteData.ramadanDialog?.buttonLink || '';
        
        renderMenu();
        renderBanner();
        renderSocial();
        renderFooter();
        renderTools();
    }
    
    // ================= SIMPLE RENDERS =================
    function renderMenu() {
        const container = document.getElementById('menuList');
        container.innerHTML = '';
        (websiteData.menuItems || []).forEach((item, i) => {
            container.innerHTML += `
                <div class="item">
                    <input value="${escapeHtml(item.name)}" placeholder="Menu Name" onchange="updateMenuItem(${i}, 'name', this.value)">
                    <input value="${escapeHtml(item.link)}" placeholder="Link URL" onchange="updateMenuItem(${i}, 'link', this.value)">
                    <button class="btn btn-danger btn-sm" onclick="removeMenuItem(${i})"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    }
    
    function renderBanner() {
        const container = document.getElementById('bannerList');
        container.innerHTML = '';
        (websiteData.bannerSlides || []).forEach((item, i) => {
            container.innerHTML += `
                <div class="item">
                    <input value="${escapeHtml(item.image)}" placeholder="Image URL" onchange="updateBanner(${i}, 'image', this.value)">
                    <input value="${escapeHtml(item.link)}" placeholder="Link URL" onchange="updateBanner(${i}, 'link', this.value)">
                    <input value="${escapeHtml(item.title)}" placeholder="Title" onchange="updateBanner(${i}, 'title', this.value)">
                    <button class="btn btn-danger btn-sm" onclick="removeBanner(${i})"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    }
    
    function renderSocial() {
        const container = document.getElementById('socialList');
        container.innerHTML = '';
        (websiteData.socialLinks || []).forEach((item, i) => {
            container.innerHTML += `
                <div class="item">
                    <input value="${escapeHtml(item.platform)}" placeholder="Platform" onchange="updateSocial(${i}, 'platform', this.value)">
                    <input value="${escapeHtml(item.url)}" placeholder="URL" onchange="updateSocial(${i}, 'url', this.value)">
                    <input value="${escapeHtml(item.icon)}" placeholder="Icon Class" onchange="updateSocial(${i}, 'icon', this.value)">
                    <button class="btn btn-danger btn-sm" onclick="removeSocial(${i})"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    }
    
    function renderFooter() {
        const container = document.getElementById('footerList');
        container.innerHTML = '';
        (websiteData.footerLinks || []).forEach((item, i) => {
            container.innerHTML += `
                <div class="item">
                    <input value="${escapeHtml(item.name)}" placeholder="Link Name" onchange="updateFooter(${i}, 'name', this.value)">
                    <input value="${escapeHtml(item.link)}" placeholder="Link URL" onchange="updateFooter(${i}, 'link', this.value)">
                    <button class="btn btn-danger btn-sm" onclick="removeFooter(${i})"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    }
    
    // ================= TOOLS RENDER WITH DRAG & DROP =================
    function renderTools() {
        const container = document.getElementById('toolsContainer');
        container.innerHTML = '';
        sortableInstances = [];
        
        const sections = websiteData.tools?.sections || [];
        
        sections.forEach((section, sectionIndex) => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'tools-section';
            sectionDiv.setAttribute('data-section-index', sectionIndex);
            
            // Section Header
            sectionDiv.innerHTML = `
                <div class="section-header-bar">
                    <i class="fas fa-grip-vertical drag-section-handle" style="cursor: grab;"></i>
                    <input type="text" value="${escapeHtml(section.section_title)}" placeholder="Category Name" onchange="updateToolSection(${sectionIndex}, 'section_title', this.value)">
                    <input type="color" class="color-picker" value="${section.title_color || '#ff0033'}" onchange="updateToolSection(${sectionIndex}, 'title_color', this.value)">
                    <button class="btn btn-danger btn-sm" onclick="removeToolSection(${sectionIndex})"><i class="fas fa-trash"></i> Delete</button>
                </div>
                <div class="tools-list" id="tools-list-${sectionIndex}" data-section="${sectionIndex}"></div>
                <div style="padding: 0 15px 15px 15px;">
                    <button class="btn btn-sm" style="width:100%;" onclick="addTool(${sectionIndex})"><i class="fas fa-plus"></i> Add Tool</button>
                </div>
            `;
            
            container.appendChild(sectionDiv);
            
            // Render tools in this section
            const toolsListDiv = document.getElementById(`tools-list-${sectionIndex}`);
            toolsListDiv.innerHTML = '';
            
            section.tools.forEach((tool, toolIndex) => {
                const toolDiv = document.createElement('div');
                toolDiv.className = 'tool-item';
                toolDiv.setAttribute('data-tool-index', toolIndex);
                toolDiv.innerHTML = `
                    <div class="tool-item-header" onclick="toggleToolEdit(this.parentElement)">
                        <i class="fas fa-grip-vertical drag-handle"></i>
                        <div class="tool-icon-preview"><i class="${tool.icon}"></i></div>
                        <div class="tool-title-preview"><strong>${escapeHtml(tool.title)}</strong></div>
                        <i class="fas fa-chevron-down" style="color: #666; font-size: 12px;"></i>
                    </div>
                    <div class="tool-edit-panel">
                        <div class="grid-2">
                            <div class="input-group"><label>Tool Title</label><input type="text" value="${escapeHtml(tool.title)}" onchange="updateTool(${sectionIndex}, ${toolIndex}, 'title', this.value)"></div>
                            <div class="input-group"><label>Tool URL</label><input type="text" value="${tool.url}" onchange="updateTool(${sectionIndex}, ${toolIndex}, 'url', this.value)"></div>
                            <div class="input-group"><label>Icon Class</label><input type="text" value="${tool.icon}" onchange="updateTool(${sectionIndex}, ${toolIndex}, 'icon', this.value)"></div>
                            <div class="input-group"><label>Tag/Badge</label><input type="text" value="${tool.tag || ''}" onchange="updateTool(${sectionIndex}, ${toolIndex}, 'tag', this.value)"></div>
                        </div>
                        <div class="input-group"><label>Description</label><textarea rows="2" onchange="updateTool(${sectionIndex}, ${toolIndex}, 'desc', this.value)">${escapeHtml(tool.desc)}</textarea></div>
                        <button class="btn btn-danger btn-sm" onclick="removeTool(${sectionIndex}, ${toolIndex})"><i class="fas fa-trash"></i> Delete Tool</button>
                    </div>
                `;
                toolsListDiv.appendChild(toolDiv);
            });
            
            // Initialize Sortable for tools inside this section (vertical drag within section)
            const toolsSortable = new Sortable(toolsListDiv, {
                group: {
                    name: 'tools',
                    pull: true,
                    revertClone: false
                },
                handle: '.drag-handle',
                animation: 250,
                ghostClass: 'sortable-ghost',
                onEnd: function(evt) {
                    const fromSection = parseInt(evt.from.dataset.section);
                    const toSection = parseInt(evt.to.dataset.section);
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    
                    if (fromSection === toSection) {
                        // Reorder within same section
                        const [movedTool] = websiteData.tools.sections[fromSection].tools.splice(oldIndex, 1);
                        websiteData.tools.sections[toSection].tools.splice(newIndex, 0, movedTool);
                    } else {
                        // Move tool from one section to another
                        const [movedTool] = websiteData.tools.sections[fromSection].tools.splice(oldIndex, 1);
                        websiteData.tools.sections[toSection].tools.splice(newIndex, 0, movedTool);
                    }
                    renderTools(); // Re-render to update indices
                }
            });
            sortableInstances.push(toolsSortable);
        });
        
        // Make sections sortable (reorder sections)
        const sectionsContainer = container;
        new Sortable(sectionsContainer, {
            handle: '.drag-section-handle',
            animation: 250,
            ghostClass: 'sortable-ghost',
            onEnd: function(evt) {
                const oldIndex = evt.oldIndex;
                const newIndex = evt.newIndex;
                const [movedSection] = websiteData.tools.sections.splice(oldIndex, 1);
                websiteData.tools.sections.splice(newIndex, 0, movedSection);
                renderTools();
            }
        });
    }
    
    function toggleToolEdit(element) {
        element.classList.toggle('active');
    }

    function updateToolSection(sIdx, field, val) { websiteData.tools.sections[sIdx][field] = val; }

    function removeToolSection(sIdx) { 
        Swal.fire({ title: 'Delete Category?', text: 'All tools inside will be deleted', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ff0055' }).then(res => {

    }
    
    function addTool(sIdx) { 
        websiteData.tools.sections[sIdx].tools.push({ 
            title: "New Tool", url: "https://", icon: "fas fa-tool", 
            desc: "Tool description here", tag: "NEW" 
        }); 
        renderTools(); 
    }
    function removeTool(sIdx, tIdx) { websiteData.tools.sections[sIdx].tools.splice(tIdx, 1); renderTools(); }
    function updateTool(sIdx, tIdx, field, val) { websiteData.tools.sections[sIdx].tools[tIdx][field] = val; }
    
    // ================= SAVE TO GIST =================
    async function saveAllData() {
        // Collect site config
        websiteData.siteConfig = {
            siteTitle: document.getElementById('siteTitle').value,
            primaryColor: document.getElementById('primaryColor').value,
            logoUrl: document.getElementById('logoUrl').value,
            footerText: document.getElementById('footerText').value
        };
        
        websiteData.ramadanDialog = {
            enabled: document.getElementById('ramadanEnabled').value === 'true',
            title: document.getElementById('ramadanTitle').value,
            message: document.getElementById('ramadanMessage').value,
            buttonText: document.getElementById('ramadanButtonText').value,
            buttonLink: document.getElementById('ramadanButtonLink').value
        };
        
        const saveBtn = event.target;
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SAVING...';
        
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: {
                        'tools.json': {
                            content: JSON.stringify(websiteData, null, 2)
                        }
                    }
                })
            });
            
            if (response.ok) {
                Swal.fire({ icon: 'success', title: 'Saved!', text: 'All changes saved to GitHub Gist', background: '#0a0a10', color: '#fff' });
            } else {
                throw new Error('Save failed');
            }
        } catch(error) {
            Swal.fire({ icon: 'error', title: 'Failed!', text: 'Could not save to Gist', background: '#0a0a10', color: '#fff' });
        }
        
        saveBtn.innerHTML = originalText;
    }
    
    // ================= UTILITIES =================
    function showTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        event.target.classList.add('active');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
